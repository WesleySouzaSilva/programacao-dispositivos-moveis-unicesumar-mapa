name: release

# Publica o fat jar do protótipo desktop (Etapa 2) em GitHub Releases.
# Disparo:
#   - push de tag no formato v* (ex.: v1.0.0)
#   - workflow_dispatch (criação manual pela aba Actions)
# Anexa: target/usuarios-desktop-1.0.0-all.jar
# Requer permissão `contents: write` (padrão para GITHUB_TOKEN em repos públicos).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build fat jar
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 11 (compila para JVM target 11)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Build fat jar (Maven)
        run: mvn -B -DskipTests package

      - name: Listar artefatos produzidos
        run: ls -lh target/

      - name: Upload do fat jar como artifact
        uses: actions/upload-artifact@v4
        with:
          name: usuarios-desktop-jar
          path: target/usuarios-desktop-1.0.0-all.jar
          if-no-files-found: error

  release:
    name: Publicar GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar fat jar do job anterior
        uses: actions/download-artifact@v4
        with:
          name: usuarios-desktop-jar
          path: dist

      - name: Criar Release e anexar o jar
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/usuarios-desktop-1.0.0-all.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}